<div class="p-input-icon-left p-mb-3">
    <i class="pi pi-search"></i>
    <input
      #searchBox
      type="text"
      pInputText
      placeholder="Search..."
      (input)="table.filterGlobal(searchBox.value, 'contains')"
    />
  </div>
  
  <div class="card">
    <p-table
      #table
      [value]="projects"
      [paginator]="true"
      [rows]="5"
      [responsiveLayout]="'scroll'"
      [globalFilterFields]="['name', 'description', 'createdBy']"
      [tableStyle]="{ 'min-width': '60rem' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Created By</th>
        </tr>
      </ng-template>
  
      <ng-template pTemplate="body" let-project>
        <tr>
          <td>{{ project.name }}</td>
          <td>{{ project.description }}</td>
          <td>{{ project.createdBy }}</td>
        </tr>
      </ng-template>
  
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3">No projects found.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>
