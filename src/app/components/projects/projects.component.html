<div class="projects-container">

  <!-- Zone de recherche -->
  <div class="search-bar">
    <span class="p-input-icon-left">
      <i class="pi pi-search"></i>
      <input
        #searchBox
        type="text"
        pInputText
        placeholder="Search..."
        (input)="table.filterGlobal(searchBox.value, 'contains')"
      />
    </span>
  </div>

  <!-- Header avec bouton -->
  <div class="header-bar">
    <h2>Projects</h2>
    <button
      pButton
      type="button"
      label="Add Project"
      icon="pi pi-plus"
      class="btn-black"
      (click)="displayAddProjectDialog = true"
    ></button>
  </div>

  <!-- Tableau des projets -->
  <div class="card project-table">
    <p-table
      #table
      [value]="projects"
      [paginator]="true"
      [rows]="5"
      [responsiveLayout]="'scroll'"
      [globalFilterFields]="['name', 'description', 'createdBy']"
      [tableStyle]="{ 'min-width': '60rem' }"
    >
      <ng-template pTemplate="header">
        <tr>
          <th>Name</th>
          <th>Description</th>
          <th>Created By</th>
        </tr>
      </ng-template>
      <ng-template pTemplate="body" let-project>
        <tr>
          <td>{{ project.name }}</td>
          <td>{{ project.description }}</td>
          <td>{{ project.createdBy }}</td>
        </tr>
      </ng-template>
      <ng-template pTemplate="emptymessage">
        <tr>
          <td colspan="3">No projects found.</td>
        </tr>
      </ng-template>
    </p-table>
  </div>

  <!-- Dialog -->
  <p-dialog
    header="Add Project"
    [(visible)]="displayAddProjectDialog"
    [modal]="true"
    [closable]="true"
    [style]="{width: '40vw'}"
  >
    <app-modal-project></app-modal-project>
  </p-dialog>
</div>
