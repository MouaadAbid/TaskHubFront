<div class="task-container">

  <!-- Header avec titre et bouton -->
  <div class="task-header">
    <h2>My Tasks</h2>
    <button
      pButton
      type="button"
      label="New Task"
      icon="pi pi-plus"
      class="btn-black"
      (click)="openTaskModal()"
    ></button>
  </div>

  <!-- Zone de recherche -->
  <div class="task-search">
    <span class="p-input-icon-left full-width">
      <i class="pi pi-search"></i>
      <input type="text" pInputText placeholder="Search..." />
    </span>
  </div>

  <!-- Filtres -->
  <div class="task-filters">
    <p-dropdown
      [options]="[
        { label: 'Low', value: 'low' },
        { label: 'Medium', value: 'medium' },
        { label: 'High', value: 'high' }
      ]"
      placeholder="All Priorities"
      class="priority-dropdown"
    ></p-dropdown>
  </div>

  <!-- Onglets -->
  <p-tabView>
    <p-tabPanel header="All">
      <div class="tab-content">
        <div class="empty-state">
          No tasks found in 'All'. Create a new task to get started!
        </div>
      </div>
    </p-tabPanel>

    <p-tabPanel header="Active">
      <div class="tab-content">
        <div class="empty-state">
          No tasks found in 'Active'.
        </div>
      </div>
    </p-tabPanel>

    <p-tabPanel header="Completed">
      <div class="tab-content">
        <div class="empty-state">
          No tasks found in 'Completed'.
        </div>
      </div>
    </p-tabPanel>
  </p-tabView>

  <!-- Dialog -->
  <p-dialog
    header="Create New Task"
    [(visible)]="displayNewTaskDialog"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '40vw' }"
  >
    <app-modal-task></app-modal-task>
  </p-dialog>
</div>
