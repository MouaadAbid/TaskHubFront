<div class="task-container">

  <!-- Header avec titre et bouton -->
  <div class="task-header">
    <h2>My Tasks</h2>
    <button
      pButton
      type="button"
      label="New Task"
      icon="pi pi-plus"
      class="btn-black"
      (click)="openTaskModal()"
    ></button>
  </div>

  <!-- Zone de recherche -->
  <div class="task-search">
    <span class="p-input-icon-left full-width">
      <i class="pi pi-search"></i>
      <input type="text" pInputText placeholder="Search..." />
    </span>
  </div>

  <!-- Filtres -->
  <div class="task-filters">
    <p-dropdown
      [options]="[
        { label: 'Low', value: 'low' },
        { label: 'Medium', value: 'medium' },
        { label: 'High', value: 'high' }
      ]"
      placeholder="All Priorities"
      class="priority-dropdown"
    ></p-dropdown>
  </div>

  <!-- Onglets -->
  <p-tabView>
    <p-tabPanel header="All">
      <div class="tab-content">
        <div *ngIf="tasks.length === 0" class="empty-state">
          No tasks found.
        </div>
  
        <table *ngIf="tasks.length > 0" class="task-table">
          <thead>
            <tr>
              <th>Title</th>
              <th>Description</th>
              <th>Due Date</th>
              <th>Status</th>
              <th>Priority</th>
              <th>Project</th>
              <th>Assigned To</th>
            </tr>
          </thead>
          <tbody>
            <tr *ngFor="let task of tasks">
              <td>{{ task.title }}</td>
              <td>{{ task.description }}</td>
              <td>{{ task.due_date | date: 'mediumDate' }}</td>
              <td>{{ task.status }}</td>
              <td>{{ task.priority }}</td>
              <td>{{ task.project }}</td>
              <td>{{ task.assigned_to }}</td>
            </tr>
          </tbody>
        </table>
      </div>
    </p-tabPanel>
  </p-tabView>
  
  <!-- Dialog -->
  <p-dialog
    header="Create New Task"
    [(visible)]="displayNewTaskDialog"
    [modal]="true"
    [closable]="true"
    [style]="{ width: '40vw' }"
  >
    <app-modal-task (taskCreated)="onTaskCreated($event)"></app-modal-task>
  </p-dialog>

</div>
